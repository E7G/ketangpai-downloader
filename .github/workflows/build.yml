name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies & PyInstaller
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --name ketangpai_gui ketangpai_gui.py

      - name: Create Release & Upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ketangpai_gui.exe
          generate_release_notes: true